<!DOCTYPE html>
<html>
<head>
    <title>Intelligent Shopping Cart</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cart-container {
            width: 600px;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        h3 {
            margin-top: 20px;
            color: #444;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            color: #444;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border-radius: 6px;
            border: none;
            background: #080808;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #111111;
        }

        hr {
            margin: 20px 0;
        }

        #cart p {
            background: #f6f8ff;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #cart input {
            width: 60px;
            margin: 0 10px;
        }

        #cart button {
            width: auto;
            background: #f17c7c;
            padding: 6px 10px;
        }

        #cart button:hover {
            background: #f17c7c;
        }

        #couponMsg {
            font-size: 14px;
            margin-top: 8px;
        }

        .total-box {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            color: #222;
        }
    </style>
</head>

<body>

<div class="cart-container">

<h2>🛒 Intelligent Shopping Cart</h2>

<div class="section">
    <label>Product</label>
    <select id="productSelect">
        <option value="Laptop">Laptop</option>
        <option value="Book">Book</option>
        <option value="Headphones">Headphones</option>
    </select>

    <label>Quantity</label>
    <input type="number" id="quantity" value="1" min="1">

    <button onclick="addToCart()">Add to Cart</button>
</div>

<hr>

<div class="section">
    <label>Coupon Code</label>
    <input type="text" id="coupon">
    <button onclick="applyCoupon()">Apply Coupon</button>
    <p id="couponMsg"></p>
</div>

<hr>

<h3>Cart Items</h3>
<div id="cart"></div>

<div class="total-box">
    Total: ₹<span id="total">0</span>
</div>

</div>

<script>
// Product database
const products = {
    Laptop: { price: 50000, category: "electronics" },
    Book: { price: 500, category: "education" },
    Headphones: { price: 2000, category: "electronics" }
};

let cart = [];
let couponDiscount = 0;

function addToCart() {
    let name = document.getElementById("productSelect").value;
    let qty = parseInt(document.getElementById("quantity").value);

    let item = cart.find(p => p.name === name);

    if (item) {
        item.quantity += qty;
    } else {
        cart.push({
            name: name,
            price: products[name].price,
            category: products[name].category,
            quantity: qty
        });
    }
    updateCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
}

function updateQuantity(index, value) {
    cart[index].quantity = parseInt(value);
    updateCart();
}

function applyCoupon() {
    let code = document.getElementById("coupon").value.trim().toUpperCase();
    let msg = document.getElementById("couponMsg");

    if (code.startsWith("SAVE10")) {
        couponDiscount = 10;
        msg.innerHTML = "10% coupon applied";
        msg.style.color = "green";
    }
    else if (code.startsWith("SAVE20")) {
        couponDiscount = 20;
        msg.innerHTML = "20% coupon applied";
        msg.style.color = "green";
    }
    else {
        couponDiscount = 0;
        msg.innerHTML = "Invalid coupon";
        msg.style.color = "red";
    }
    updateCart();
}

function calculateDiscounts(total) {
    let discount = 0;

    let totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
    if (totalQty >= 5) discount += total * 0.1;

    cart.forEach(item => {
        if (item.category === "electronics") {
            discount += item.price * item.quantity * 0.05;
        }
    });

    discount += total * (couponDiscount / 100);

    let hour = new Date().getHours();
    if (hour >= 18 && hour <= 21) discount += total * 0.05;

    return discount;
}

function updateCart() {
    let cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.quantity;

        cartDiv.innerHTML += `
            <p>
                ${item.name} - ₹${item.price}
                <input type="number" value="${item.quantity}" min="1"
                onchange="updateQuantity(${index}, this.value)">
                <button onclick="removeItem(${index})">Remove</button>
            </p>
        `;
    });

    let discount = calculateDiscounts(total);
    document.getElementById("total").innerHTML = (total - discount).toFixed(2);
}
</script>

</body>
</html>
