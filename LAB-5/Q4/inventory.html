<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory System</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            max-width: 1200px; margin: 0 auto; padding: 20px;
            background: linear-gradient(135deg, #AEC6CF 0%, #B3EBF2 100%);
            min-height: 100vh;
        }
        .container { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            padding: 30px; 
        }
        h1 { text-align: center; color: #2c5282; margin-bottom: 30px; }
        .form-section { 
            background: linear-gradient(135deg, #AEC6CF, #B3EBF2); 
            padding: 25px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
        }
        .form-row, .search-row { 
            display: flex; gap: 15px; flex-wrap: wrap; align-items: end; 
        }
        input, select, button { 
            padding: 12px 18px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 15px; 
            transition: all 0.3s; 
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: #4c51bf; 
            box-shadow: 0 0 0 3px rgba(76,81,191,0.1); 
        }
        button { 
            background: linear-gradient(45deg, #48bb78, #38a169); 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(72,187,120,0.3); }
        .btn-edit { background: linear-gradient(45deg, #ed8936, #dd6b20); }
        .btn-danger { background: linear-gradient(45deg, #f56565, #e53e3e); }
        .btn-cancel, .btn-clear { background: #a0aec0; }
        .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-card { 
            background: white; padding: 20px; border-radius: 12px; 
            text-align: center; flex: 1; min-width: 150px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        
        /* BLACK BORDER TABLE */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border: 2px solid black;
            margin-bottom: 20px;
        }
        th { 
            background: linear-gradient(45deg, #424242, #121213); 
            color: white; 
            padding: 18px; 
            text-align: left; 
            font-weight: 600;
            border: 1px solid black;
        }
        td { 
            padding: 18px; 
            border: 1px solid black;
        }
        tr:hover { background: #ebf8ff; }
        
        .low-stock { background: #fed7d7 !important; color: #742a2a; font-weight: bold; }
        .in-stock { background: #c6f6d5 !important; color: #22543d; }
        .out-stock { background: #fed7aa !important; color: #744210; }
        
        .message { 
            padding: 15px 25px; 
            margin: 20px 0; 
            border-radius: 12px; 
            font-weight: 500; 
            display: none; 
            animation: slideIn 0.4s ease; 
        }
        .success { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .error { background: #fed7d7; color: #742a2a; border: 1px solid #fc8181; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        .editing { border-color: #ed8936 !important; box-shadow: 0 0 0 3px rgba(237,137,54,0.2) !important; }
        .search-section { background: rgba(255,255,255,0.8); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Product Inventory System</h1>
        <div id="message" class="message"></div>

        <!-- Search Section -->
        <div class="search-section">
            <h3> Search by Category</h3>
            <div class="search-row">
                <select id="searchCategory">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Books">Books</option>
                    <option value="Food">Food</option>
                </select>
                <button onclick="filterProducts()">Search</button>
                <button onclick="loadProducts()" class="btn-clear">Show All</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats">
            <div class="stat-card">
                <h4>Total Products</h4>
                <div id="totalProducts" style="font-size: 2em; font-weight: bold; color: #4c51bf;">0</div>
            </div>
            <div class="stat-card">
                <h4>Low Stock</h4>
                <div id="lowStock" style="font-size: 2em; font-weight: bold; color: #ed8936;">0</div>
            </div>
            <div class="stat-card">
                <h4>Total Value</h4>
                <div id="totalValue" style="font-size: 2em; font-weight: bold; color: #48bb78;">$0</div>
            </div>
        </div>

        <!-- Product Form -->
        <div class="form-section">
            <h3 id="formTitle">Add New Product</h3>
            <div class="form-row">
                <input type="hidden" id="editId" value="">
                <input type="text" id="productName" placeholder="Product Name *" maxlength="50">
                <select id="productCategory">
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Books">Books</option>
                    <option value="Food">Food</option>
                </select>
                <input type="number" id="productPrice" placeholder="Price *" min="0.01" step="0.01">
                <input type="number" id="productStock" placeholder="Stock *" min="0">
                <button onclick="saveProduct()" id="saveBtn">Add Product</button>
                <button onclick="cancelEdit()" class="btn-cancel">Cancel</button>
            </div>
        </div>

        <!-- Products Table -->
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Value</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productList"></tbody>
        </table>
    </div>

    <script>
        let allProducts = [];
        let currentFilter = '';

        // LocalStorage JSON Helpers
        function getStoredData() {
            const stored = localStorage.getItem('inventoryData');
            if (!stored) {
                const defaultData = {
                    products: [
                        { id: 1, name: "iPhone 15", category: "Electronics", price: 999.99, stock: 5 },
                        { id: 2, name: "T-Shirt", category: "Clothing", price: 19.99, stock: 25 },
                        { id: 3, name: "Python Book", category: "Books", price: 29.99, stock: 3 },
                        { id: 4, name: "Chips", category: "Food", price: 2.99, stock: 100 }
                    ]
                };
                localStorage.setItem('inventoryData', JSON.stringify(defaultData));
                return defaultData;
            }
            return JSON.parse(stored);
        }

        function saveData(data) {
            localStorage.setItem('inventoryData', JSON.stringify(data));
        }

        // Fetch API Simulation
        async function fetchProducts() {
            try {
                const response = new Response(JSON.stringify(getStoredData()));
                return await response.json();
            } catch (error) {
                throw new Error('JSON parsing failed: ' + error.message);
            }
        }

        // UI Helpers
        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3500);
        }

        function clearForm() {
            document.getElementById('editId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productCategory').value = 'Electronics';
            document.getElementById('productPrice').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('formTitle').textContent = '➕ Add New Product';
            document.getElementById('saveBtn').textContent = '➕ Add Product';
            document.querySelectorAll('input, select').forEach(el => el.classList.remove('editing'));
        }

        function cancelEdit() { clearForm(); }

        // Validation
        function validateProduct(name, price, stock) {
            if (!name?.trim() || name.trim().length < 2) return 'Name must be at least 2 characters';
            if (price <= 0) return 'Price must be greater than 0';
            if (stock < 0) return 'Stock cannot be negative';
            return null;
        }

        // Load & Display (READ)
        async function loadProducts(category = '') {
            try {
                currentFilter = category;
                const data = await fetchProducts();
                allProducts = data.products || [];
                
                const filteredProducts = category 
                    ? allProducts.filter(p => p.category === category)
                    : allProducts;
                
                displayProducts(filteredProducts);
                updateStats(filteredProducts);
            } catch (error) {
                showMessage('Error loading inventory: ' + error.message, 'error');
            }
        }

        function displayProducts(products) {
            const tbody = document.getElementById('productList');
            tbody.innerHTML = '';

            if (!products || products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#666;">No products found</td></tr>';
                return;
            }

            products.forEach(product => {
                const value = (product.price * product.stock).toLocaleString('en-US', { 
                    style: 'currency', currency: 'USD' 
                });
                const stockClass = product.stock === 0 ? 'out-stock' : 
                                 product.stock <= 5 ? 'low-stock' : 'in-stock';

                const row = document.createElement('tr');
                row.className = stockClass;
                row.innerHTML = `
                    <td><strong>#${product.id}</strong></td>
                    <td>${product.name}</td>
                    <td>${product.category}</td>
                    <td>$${product.price.toFixed(2)}</td>
                    <td>${product.stock}</td>
                    <td>${value}</td>
                    <td>
                        <button onclick="editProduct(${product.id})" class="btn-edit">✏️ Edit</button>
                        <button onclick="deleteProduct(${product.id})" class="btn-danger">🗑️ Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats(products) {
            const totalProducts = products.length;
            const lowStock = products.filter(p => p.stock > 0 && p.stock <= 5).length;
            const totalValue = products.reduce((sum, p) => sum + (p.price * p.stock), 0);

            document.getElementById('totalProducts').textContent = totalProducts;
            document.getElementById('lowStock').textContent = lowStock;
            document.getElementById('totalValue').textContent = totalValue.toLocaleString('en-US', { 
                style: 'currency', currency: 'USD' 
            });
        }

        // Filter by Category
        function filterProducts() {
            const category = document.getElementById('searchCategory').value;
            loadProducts(category);
        }

        // CREATE/UPDATE
        async function saveProduct() {
            const id = parseInt(document.getElementById('editId').value);
            const name = document.getElementById('productName').value.trim();
            const category = document.getElementById('productCategory').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const stock = parseInt(document.getElementById('productStock').value);

            const validationError = validateProduct(name, price, stock);
            if (validationError) {
                showMessage(validationError, 'error');
                return;
            }

            try {
                const data = await fetchProducts();
                
                if (id) {
                    // UPDATE
                    const product = data.products.find(p => p.id === id);
                    if (product) {
                        product.name = name;
                        product.category = category;
                        product.price = price;
                        product.stock = stock;
                        showMessage(`✅ "${name}" updated!`, 'success');
                    }
                } else {
                    // CREATE
                    const newId = Math.max(...data.products.map(p => p.id), 0) + 1;
                    data.products.push({ id: newId, name, category, price, stock });
                    showMessage(`✅ "${name}" added! (ID: ${newId})`, 'success');
                }

                saveData(data);
                clearForm();
                loadProducts(currentFilter);

            } catch (error) {
                showMessage('Error saving product: ' + error.message, 'error');
            }
        }

        // EDIT
        function editProduct(id) {
            const product = allProducts.find(p => p.id === id);
            if (product) {
                document.getElementById('editId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                
                document.getElementById('formTitle').textContent = '✏️ Edit Product';
                document.getElementById('saveBtn').textContent = '💾 Update Product';
                
                document.querySelectorAll('input, select').forEach(el => el.classList.add('editing'));
                document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // DELETE
        function deleteProduct(id) {
            if (!confirm(`Delete product #${id}?`)) return;
            
            try {
                const data = getStoredData();
                data.products = data.products.filter(p => p.id !== id);
                saveData(data);
                showMessage('✅ Product deleted!', 'success');
                loadProducts(currentFilter);
            } catch (error) {
                showMessage('Error deleting product', 'error');
            }
        }

        // Initialize
        window.onload = () => loadProducts();
    </script>
</body>
</html>
