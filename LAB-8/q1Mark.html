<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Marks Calculator</title>
</head>
<body>

    <h2>Student Marks Calculator</h2>

    <label>Enter Student Name:</label><br>
    <input type="text" id="name"><br><br>

    <label>Enter Marks for Subject 1:</label><br>
    <input type="number" id="m1"><br><br>

    <label>Enter Marks for Subject 2:</label><br>
    <input type="number" id="m2"><br><br>

    <label>Enter Marks for Subject 3:</label><br>
    <input type="number" id="m3"><br><br>

    <button onclick="calculate()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        // Arrow function to calculate average
        const calculateAverage = (total, subjects) => total / subjects;

        function calculate() {
            // Taking user input
            let name = document.getElementById("name").value;
            let m1 = Number(document.getElementById("m1").value);
            let m2 = Number(document.getElementById("m2").value);
            let m3 = Number(document.getElementById("m3").value);

            // Calculating total
            const total = m1 + m2 + m3;

            // Calculating average using arrow function
            const average = calculateAverage(total, 3);

            // Display result using template literals
            document.getElementById("result").innerText = 
                `Student Name: ${name}
Total Marks: ${total}
Average Marks: ${average.toFixed(2)}`;
        }
    </script>

</body>
</html>
