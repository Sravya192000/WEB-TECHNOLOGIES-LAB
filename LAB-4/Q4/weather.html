<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 8px;
            width: 70%;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        #spinner {
            display: none;
            margin-top: 10px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .result {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Weather Dashboard</h2>

    <input type="text" id="cityInput" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>

    <div id="spinner">Loading...</div>
    <div id="error" class="error"></div>
    <div id="result" class="result"></div>
</div>

<script src="weather.js"></script>
</body>
</html>
